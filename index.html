<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paras Ajin Fatke | AIML Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- PREMIUM COLOR THEME --- */
        :root {
            /* Light Mode Colors */
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #475569;
            --card-bg: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --accent-color: #4f46e5; /* Deep Indigo */
            --gradient-accent: linear-gradient(135deg, #4f46e5, #9333ea);
            --border-color: #e2e8f0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            /* Dark Mode Colors - Deep Slate */
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: #1e293b;
            --nav-bg: rgba(15, 23, 42, 0.95);
            --accent-color: #818cf8; /* Light Indigo */
            --gradient-accent: linear-gradient(135deg, #818cf8, #c084fc);
            --border-color: #334155;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* --- GLOBAL SETTINGS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            /* This fixes the navigation linking issue! */
            scroll-behavior: smooth;
            scroll-padding-top: 90px; /* Prevents nav bar from covering sections */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            line-height: 1.7;
        }

            padding: 1.2rem 8%;
